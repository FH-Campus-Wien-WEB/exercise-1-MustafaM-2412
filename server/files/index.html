<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        body {
            background-color: #fdfcf5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a; /* Kein hartes Schwarz, sondern ein dunkles Grau */
            line-height: 1.6; /* Mehr Zeilenabstand für bessere Lesbarkeit */
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .movie-item {
            background-color: #e0f2f1;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 30px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .movie-item:hover {
            transform: translateY(-5px);
        }

        .movie-item img {
            width: 200px;
            height: auto;
            border-radius: 10px;
            box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
            align-self: flex-start;
        }

        .movie-text-container {
            flex-grow: 1;
        }

        .movie-item h2 {
            margin-top: 0;

            color: #2c3e50;
            font-size: 1.8rem;
            font-weight: 600;
            border-bottom: 2px solid #b2dfdb;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .movie-item p {
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .movie-item strong {
            color: #546e7a;
            font-weight: 600;
        }

        .plot {
            background-color: #f1f8e9;
            padding: 15px;
            border-radius: 8px;
            font-style: italic;
            margin: 15px 0;
            border-left: 4px solid #aed581;
        }

        .movie-item aside {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #b2dfdb;
            display: flex;
            gap: 20px;
        }

        hr {
            display: none;
        }
    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
		            /* Part 2: Build the HTML elements here and append them to the body */
                    // JSON-String in JavaScript-Objekte umwandeln
                    const movies = JSON.parse(xhr.responseText);

                    // Loop durch Movie-Array
                    movies.forEach(movie => {
                        const movieArticle = document.createElement("article");
                        movieArticle.className = "movie-item";

                        // Poster erstellen + Alternative Text falls Bild fehlt
                        if (movie.Poster) {
                            const img = document.createElement("img");
                            img.src = movie.Poster;
                            img.alt = "Poster von " + movie.Title;
                            movieArticle.appendChild(img);
                        }

                        const textContainer = document.createElement("div");
                        textContainer.className = "movie-text-container";

                        const title = document.createElement("h2");
                        title.textContent = movie.Title;
                        textContainer.appendChild(title);

                        const details = document.createElement("section");
                        details.innerHTML = `
                            <p><strong>Veröffentlicht:</strong> ${movie.Released}</p>
                            <p><strong>Dauer:</strong> ${movie.Runtime} min</p>
                            <p><strong>Genres:</strong> ${movie.Genres.join(", ")}</p>
                            <p><strong>Regie:</strong> ${movie.Directors.join(", ")}</p>
                            <p><strong>Darsteller:</strong> ${movie.Actors.join(", ")}</p>
                        `;
                        textContainer.appendChild(details);

                        const description = document.createElement("p");
                        description.className = "plot";
                        description.textContent = movie.Plot;
                        textContainer.appendChild(description);

                        const ratings = document.createElement("aside");
                        ratings.innerHTML = `
                            <p><strong>IMDb:</strong> ${movie.imdbRating}</p>
                            <p><strong>Metascore:</strong> ${movie.Metascore}</p>
                        `;
                        textContainer.appendChild(ratings);

                        movieArticle.appendChild(textContainer);
                        bodyElement.appendChild(movieArticle);
                    });
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
